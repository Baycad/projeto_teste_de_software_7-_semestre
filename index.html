<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baycad RH — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <h1>RH System</h1>
      <span>Baycad · v1.0</span>
    </div>
    <div class="sidebar-nav">
      <a class="nav-item active" href="index.html">
        <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        Dashboard
      </a>
      <a class="nav-item" href="funcionarios.html">
        <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Funcionários
      </a>
      <a class="nav-item" href="cadastro.html">
        <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <line x1="19" y1="8" x2="19" y2="14"/>
          <line x1="22" y1="11" x2="16" y2="11"/>
        </svg>
        Cadastrar
      </a>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="main">
    <div class="page-header">
      <div class="page-title">Dashboard</div>
      <div class="page-subtitle">Visão geral dos funcionários cadastrados</div>
    </div>

    <div class="stats-grid">
      <div class="stat-card accent">
        <div class="stat-label">Total Funcionários</div>
        <div class="stat-value" id="dash-total">0</div>
        <div class="stat-badge">ativos no sistema</div>
      </div>
      <div id="dept-cards-container"></div>
    </div>

    <div class="section-title">Distribuição por Departamento</div>
    <div class="dept-grid" id="dept-breakdown"></div>
  </main>

  <!-- TOASTS -->
  <div class="toast-container" id="toasts"></div>

  <script src="js/utils.js"></script>
  <script src="js/dashboard.js"></script>

</body>
</html>
